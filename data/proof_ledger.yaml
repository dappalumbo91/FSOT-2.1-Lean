playbook_patterns:
  - pattern: wrong_bound_direction
    symptom: "linarith fails on term1 upper bound when oracle shows term1 ≈ -0.2"
    physics_cause: "Observer/quirk boosts term1 toward zero; dispersal is weak, not strong."
    fix: "Switch to term1 > -0.8 lower bound + raw_S_positive_of_term1_gt_neg_08"
    examples: [chemical, electron, medical]

  - pattern: wrong_hits_template
    symptom: "growth_term / rexp mismatch in medical proof"
    physics_cause: "recent_hits modulates exp(-α·hits/N) in term1_base"
    fix: "Use growth_term_hits_one (or domain-specific) bounds, not hits=0 template"
    examples: [medical]

  - pattern: dominance_not_sign
    symptom: "term1 < 0 proved but raw_S sign still ambiguous"
    physics_cause: "term2 = 1 is a positive floor; need |term1| > 1 + |term3|"
    fix: "Prove domain_*_term1_overcomes_term3 or magnitude lemmas"
    examples: [cmb, ai, cosmological]

  - pattern: scaled_vs_raw
    symptom: "Sign flip between raw_S and scaled_S = k · raw_S"
    physics_cause: "k > 0 is positive scale factor; signs agree but magnitudes differ"
    fix: "Prove on raw_S; scaled sign follows from k_pos"
    examples: [all domains]