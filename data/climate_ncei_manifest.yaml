# NOAA NCEI GHCND chunked ingest — memory-safe year-by-year streaming.
version: "1.1"
updated: "2026-07-01"

source:
  name: NOAA_NCEI_GHCND
  description: Global Historical Climatology Network Daily (by-year CSV.gz)
  base_url: "https://www1.ncdc.noaa.gov/pub/data/ghcn/daily/by_year"
  api_fallback:
    name: NOAA_CDO_API_v2
    base_url: "https://www.ncei.noaa.gov/cdo-web/api/v2/data"
    token_env: NOAA_TOKEN
    dataset: GHCND

cache:
  root: data/climate_cache
  chunks_dir: data/climate_cache/chunks
  state_file: data/climate_cache/ingest_state.json

